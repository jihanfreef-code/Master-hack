<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hack Art Edition</title>
    <style>
        body { background-color: #050a18; color: #00d2ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* তোর ড্রয়িং অনুযায়ী গ্রাফ এরিয়া */
        .art-graph {
            width: 100%; max-width: 350px; height: 180px;
            border: 2px solid #00d2ff; border-radius: 15px;
            margin-bottom: 20px; position: relative; background: #0a1128;
            overflow: hidden; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }
        .line { position: absolute; width: 100%; height: 2px; background: #00d2ff; top: 50%; opacity: 0.2; }
        .moving-line {
            position: absolute; width: 5px; height: 5px; background: #00d2ff;
            border-radius: 50%; box-shadow: 0 0 10px #00d2ff;
            animation: moveGraph 3s infinite linear;
        }
        @keyframes moveGraph {
            0% { left: 0; top: 70%; }
            25% { left: 25%; top: 40%; }
            50% { left: 50%; top: 60%; }
            75% { left: 75%; top: 30%; }
            100% { left: 100%; top: 50%; }
        }

        /* টাইম বাটন */
        .timer-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { 
            background: transparent; color: #00d2ff; border: 1px solid #00d2ff;
            padding: 8px 18px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .active { background: #00d2ff; color: #050a18; }

        /* তোর আঁকা সেই মেইন সিগন্যাল বক্স */
        .art-box {
            width: 100%; max-width: 350px; padding: 40px 20px;
            border: 4px solid #00d2ff; border-radius: 25px;
            text-align: center; background: #0a1128;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
        }
        .status { font-size: 14px; letter-spacing: 2px; color: #64748b; margin-bottom: 10px; }
        #signal-text { font-size: 45px; font-weight: 900; margin: 10px 0; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
        .acc { color: #00ff88; font-size: 12px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h2 style="font-size: 18px; margin-bottom: 15px;">MASTER HACK PRO</h2>

    <div class="art-graph">
        <div class="line"></div>
        <div class="moving-line"></div>
        <p style="position:absolute; bottom:5px; right:10px; font-size:10px; opacity:0.5;">REAL-TIME ART GRAPH</p>
    </div>

    <div class="timer-row">
        <button class="t-btn" onclick="update(10, this)">10s</button>
        <button class="t-btn active" onclick="update(15, this)">15s</button>
        <button class="t-btn" onclick="update(60, this)">1m</button>
    </div>

    <div class="art-box">
        <div class="status">SIGNAL GENERATED</div>
        <div id="signal-text">READY</div>
        <div class="acc">ACCURACY: 99.4%</div>
    </div>

    <script>
        function update(sec, btn) {
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const sig = document.getElementById('signal-text');
            sig.innerText = "WAIT...";
            sig.style.color = "#64748b";
            
            setTimeout(() => {
                const results = ["STRONG UP ↑", "STRONG DOWN ↓"];
                const colors = ["#00ff88", "#ff4d4d"];
                let rand = Math.floor(Math.random() * 2);
                sig.innerText = results[rand];
                sig.style.color = colors[rand];
            }, 1000);
        }
        // Initial start
        update(15, document.querySelector('.active'));
    </script>
</body>
</html>
