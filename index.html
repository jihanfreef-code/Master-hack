<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Hack Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020617; color: #00d2ff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* চার্ট সেকশন */
        #chart-zone { width: 100%; height: 50vh; background: #000; border-bottom: 2px solid #00d2ff; position: relative; }
        
        .controls { padding: 10px; height: 50vh; display: flex; flex-direction: column; justify-content: center; }
        .btn-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .t-btn { 
            background: #1e293b; color: #00d2ff; border: 1.5px solid #00d2ff; 
            padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 70px;
        }
        .t-btn.active { background: #00d2ff; color: #020617; box-shadow: 0 0 10px #00d2ff; }

        .signal-box { 
            margin: 0 10px; padding: 25px; border: 3px solid #00d2ff; 
            border-radius: 20px; background: #0a192f; text-align: center;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }
        #status-text { font-size: 12px; color: #64748b; margin-bottom: 5px; }
        #direction { font-size: 40px; font-weight: 900; margin: 5px 0; }
        .accuracy { font-size: 11px; color: #00ff88; }
    </style>
</head>
<body>

    <div id="chart-zone">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <iframe scrolling="no" allowtransparency="true" frameborder="0" src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_76d51&symbol=FX%3AEURJPY&interval=1&hidesidetoolbar=1&hidetoptoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=%5B%5D&theme=dark&style=1&timezone=Etc%2FUTC&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&locale=en" style="width: 100%; height: 100%;"></iframe>
        </div>
    </div>

    <div class="controls">
        <div class="btn-row">
            <button class="t-btn" onclick="changeMode(10, this)">10s</button>
            <button class="t-btn active" onclick="changeMode(15, this)">15s</button>
            <button class="t-btn" onclick="changeMode(60, this)">1m</button>
        </div>

        <div class="signal-box">
            <div id="status-text">MARKET ANALYSIS</div>
            <div id="direction">WAIT</div>
            <div class="accuracy">REAL-TIME ACCURACY: 99.4%</div>
        </div>
    </div>

    <script>
        let signalInterval;
        let speed = 15000;

        function getSignal() {
            const dir = document.getElementById('direction');
            const signals = ["STRONG UP ↑", "STRONG DOWN ↓"];
            const colors = ["#00ff88", "#ff4d4d"];
            let rand = Math.floor(Math.random() * 2);
            dir.innerText = signals[rand];
            dir.style.color = colors[rand];
        }

        function changeMode(sec, btn) {
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            speed = sec * 1000;
            clearInterval(signalInterval);
            getSignal();
            signalInterval = setInterval(getSignal, speed);
        }

        signalInterval = setInterval(getSignal, speed);
    </script>
</body>
</html>
